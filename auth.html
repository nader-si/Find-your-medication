<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - ابحث عن دوائك</title>
    <link rel="stylesheet" href="css/style.css">
   
</head>
<body class="light-mode">
    <header>
        <nav class="navbar">
            <div class="container">
                <a href="index.html" class="logo">
                    <i class="fas fa-pills"></i> <span data-i18n="site_name">ابحث عن دوائك</span>
                </a>
                <ul class="nav-links">
                    <li><a href="index.html" data-i18n="home">الرئيسية</a></li>
                    <li><a href="about.html" data-i18n="about">معلومات عنا</a></li>
                    <li><a href="auth.html" class="active" data-i18n="login">تسجيل الدخول</a></li>
                </ul>
                <div class="controls">
                    <button id="theme-toggle" class="icon-btn" title="تبديل المظهر">
                        <i class="fas fa-moon"></i>
                    </button>
                    <button id="lang-toggle" class="icon-btn" title="تبديل اللغة">
                        <span class="lang-text">EN</span>
                    </button>
                </div>
                <button class="mobile-menu-btn icon-btn">
                    <i class="fas fa-bars"></i>
                </button>
            </div>
        </nav>
    </header>

    <main class="auth-page">
        <div class="container">
            <div class="auth-card">
                <div class="form-toggle">
                    <button id="login-tab" class="toggle-btn active" data-i18n="login_tab">تسجيل الدخول</button>
                    <button id="signup-tab" class="toggle-btn" data-i18n="signup_tab">إنشاء حساب</button>
                </div>

                <!-- نموذج تسجيل الدخول -->
                <form id="login-form" class="auth-form active">
                    <h2 data-i18n="welcome_back">مرحباً بعودتك</h2>
                    <div class="user-type-select">
                        <label>
                            <input type="radio" name="login-type" value="patient" checked> <span data-i18n="patient">مريض</span>
                        </label>
                        <label>
                            <input type="radio" name="login-type" value="pharmacy"> <span data-i18n="pharmacy">صيدلية</span>
                        </label>
                    </div>
                    <div class="input-group">
                        <i class="fas fa-envelope"></i>
                        <input type="email" placeholder="البريد الإلكتروني" data-i18n-placeholder="email_placeholder" required>
                    </div>
                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" placeholder="كلمة المرور" data-i18n-placeholder="password_placeholder" required>
                    </div>
                    <button type="submit" class="submit-btn" data-i18n="login_btn">دخول</button>
                </form>

                <!-- نموذج إنشاء الحساب -->
                <form id="signup-form" class="auth-form">
                    <h2 data-i18n="create_account">إنشاء حساب جديد</h2>
                    <div class="user-type-select">
                        <label>
                            <input type="radio" name="signup-type" value="patient" checked> <span data-i18n="patient">مريض</span>
                        </label>
                        <label>
                            <input type="radio" name="signup-type" value="pharmacy"> <span data-i18n="pharmacy">صيدلية</span>
                        </label>
                    </div>
                    <div class="input-group">
                        <i class="fas fa-user"></i>
                        <input type="text" placeholder="الاسم الكامل" data-i18n-placeholder="fullname_placeholder" required>
                    </div>
                    <div class="input-group">
                        <i class="fas fa-envelope"></i>
                        <input type="email" placeholder="البريد الإلكتروني" data-i18n-placeholder="email_placeholder" required>
                    </div>
                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" placeholder="كلمة المرور" data-i18n-placeholder="password_placeholder" required>
                    </div>
                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" placeholder="تأكيد كلمة المرور" data-i18n-placeholder="confirm_password_placeholder" required>
                    </div>
                    <button type="submit" class="submit-btn" data-i18n="signup_btn">إنشاء</button>
                </form>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p data-i18n="footer_text">© 2024 ابحث عن دوائك. جميع الحقوق محفوظة.</p>
        </div>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
