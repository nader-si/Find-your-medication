<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Authentication - Medicine Finder</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="page-header">
    <nav class="top-nav">
      <a class="brand" href="index.html">Medicine Finder</a>
      <div class="nav-links">
        <a href="index.html" data-i18n="home">Home</a>
        <a href="about.html" data-i18n="about">About</a>
        <a href="auth.html" id="authLink" data-i18n="login">Login</a>
        <button class="lang-toggle" id="langToggle" type="button">العربية</button>
        <button class="theme-toggle" id="themeToggle" type="button">🌙</button>
      </div>
    </nav>
  </header>
  <main class="container auth-wrapper">
    <section class="card auth-card">
      <div class="toggle-row">
        <button class="toggle-btn active" id="loginTab" type="button" data-i18n="authLogin">Login</button>
        <button class="toggle-btn" id="registerTab" type="button" data-i18n="authRegister">Register</button>
      </div>
      <form id="authForm" class="auth-form">
        <input type="hidden" id="mode" name="mode" value="login" />
        <label for="username" data-i18n="authUsername">Username</label>
        <input id="username" name="username" type="text" required />
        <label for="email" data-i18n="authEmail">Email</label>
        <input id="email" name="email" type="email" />
        <label for="password" data-i18n="authPassword">Password</label>
        <input id="password" name="password" type="password" required />
        <button type="submit" data-i18n="authSignIn">Sign in</button>
      </form>
      <p id="authMessage" class="status"></p>
    </section>
  </main>
  <script src="js/script.js"></script>
</body>
</html>
