<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manage Medicines</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="page-header">
    <nav class="top-nav">
      <a class="brand" href="index.html">Medicine Finder</a>
      <div class="nav-links">
        <a href="index.html" data-i18n="home">Home</a>
        <a href="about.html" data-i18n="about">About</a>
        <a href="dashboard.html" data-i18n="dashboard">Dashboard</a>
        <a href="logout.html" id="authLink" data-i18n="logout">Logout</a>
        <button class="theme-toggle" id="themeToggle" type="button">🌙</button>
      </div>
    </nav>
  </header>
  <main class="container">
    <section class="card">
      <h2 id="formTitle" data-i18n="addMed">Add Medicine</h2>
      <p data-i18n="manageMedsDesc">Add medication details and the admin location/contact information.</p>
      <p id="successMsg" style="color:#15803d;"></p>
      <p id="errorMsg" style="color:#b91c1c;"></p>
      <form id="medForm" class="auth-form" style="margin-top:1rem;">
        <input type="hidden" name="id" value="0" />
        <label for="medName" data-i18n="medName">Medicine Name</label>
        <input id="medName" name="name" type="text" required />
        <label for="genericName" data-i18n="genericName">Generic Name</label>
        <input id="genericName" name="generic_name" type="text" />
        <label for="category" data-i18n="category">Category</label>
        <input id="category" name="category" type="text" />
        <label for="dosage" data-i18n="dosage">Dosage</label>
        <input id="dosage" name="dosage" type="text" />
        <label for="price" data-i18n="price">Price</label>
        <input id="price" name="price" type="text" />
        <label for="stock" data-i18n="stock">Stock</label>
        <input id="stock" name="stock" type="number" min="0" value="0" />
        <label for="location" data-i18n="location">Location</label>
        <input id="location" name="location" type="text" />
        <label for="adminName" data-i18n="adminName">Admin Name</label>
        <input id="adminName" name="admin_name" type="text" />
        <label for="adminPhone" data-i18n="adminPhone">Admin Phone</label>
        <input id="adminPhone" name="admin_phone" type="text" />
        <label for="description" data-i18n="description">Description</label>
        <textarea id="description" name="description" rows="4"></textarea>
        <label for="sideEffects" data-i18n="sideEffects">Side Effects</label>
        <textarea id="sideEffects" name="side_effects" rows="4"></textarea>
        <button id="submitBtn" type="submit" data-i18n="addMed">Add Medicine</button>
      </form>
    </section>
    <section class="card" style="margin-top:1.5rem;">
      <h3 data-i18n="existingMeds">Existing Medicines</h3>
      <form id="medSearchForm" class="search-box" style="justify-content:flex-start;margin-bottom:1rem;">
        <input type="text" id="medSearchInput" data-i18n="searchPlaceholder" placeholder="Search medicines" />
        <button type="submit" data-i18n="searchButton">Search</button>
        <a href="medicines.html" id="medClearSearch" data-i18n="clear" style="text-decoration:none;color:var(--primary);">Clear</a>
      </form>
      <div class="results-list" id="medList">
        <p class="status" data-i18n="noMeds">No medications yet.</p>
      </div>
    </section>
  </main>
  <script src="js/script.js"></script>
</body>
</html>
