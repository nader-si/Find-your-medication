<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Medicine Finder</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="hero">
    <nav class="top-nav">
      <a class="brand" href="index.html">Medicine Finder</a>
      <div class="nav-links">
        <a href="index.html" data-i18n="home">Home</a>
        <a href="about.html" data-i18n="about">About</a>
        <a href="auth.html" id="authLink" data-i18n="login">Login</a>
        <button class="lang-toggle" id="langToggle" type="button">العربية</button>
        <button class="theme-toggle" id="themeToggle" type="button">🌙</button>
      </div>
    </nav>
    <div class="hero-content">
      <h1 data-i18n="heroTitle">Find trusted medicines quickly</h1>
      <p data-i18n="heroSubtitle">Search medication details, usage, dosage, and safety information in one place.</p>
      <form id="searchForm" class="search-box">
        <input id="searchInput" type="text" data-i18n="searchPlaceholder" placeholder="Search for a medicine" required />
        <button type="submit" data-i18n="searchButton">Search</button>
      </form>
      <p id="statusMessage" class="status"></p>
    </div>
  </header>
  <main class="container">
    <section class="results-card">
      <h2 data-i18n="resultsTitle">Available medicines</h2>
      <form id="inlineSearchForm" class="search-box" style="justify-content:flex-start;margin-bottom:1rem;">
        <input type="text" id="inlineSearchInput" data-i18n="searchPlaceholder" placeholder="Search medicines" />
        <button type="submit" data-i18n="searchButton">Search</button>
        <a href="index.html" id="clearSearch" data-i18n="clear" style="text-decoration:none;color:var(--primary);">Clear</a>
      </form>
      <div class="results-list cards-grid" id="medicationsList">
        <p class="status" data-i18n="statusLoading">Loading medications...</p>
      </div>
    </section>
  </main>
  <script src="js/script.js"></script>
</body>
</html>
